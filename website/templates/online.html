<!DOCTYPE html>
<html lang="en">

<head>
    {% include 'default.html' %}
    
    <meta property="og:title" content="Hab Track - Online Stats">
    <meta property="og:url" content="https://habtrack.vercel.app/online">
    <meta property="og:description" content="{{ og_description }}">
    <meta property="og:image" content="https://hab-track.vercel.app/img/og_players.png">
    <meta name="description" content="{{ og_description }}">
    
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Hab Track - Online Statistics",
        "description": "{{ og_description }}",
        "url": "https://habtrack.top/online",
        "applicationCategory": "StatisticsApplication",
        "operatingSystem": "All"
    }
    </script>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/online.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/skeleton.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/time-filters.css') }}">

    <script src="{{ url_for('static', filename='js/lazy-plotly.js') }}"></script>
    <script src="{{ url_for('static', filename='js/time-filter.js') }}"></script>

    <script>
        var onlineStatsUrl = "{{ online_api_url }}";
    </script>

    <script src="{{ url_for('static', filename='js/online.js') }}"></script>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <h1>Online Statistics</h1>
            <p>Real-time player counts across tracked retros</p>
        </div>
        
        <div class="stats-cards-primary">
            <div class="stat-card">
                <div class="label">Total Players Online</div>
                <div class="value" id="total-online">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Tracked Retros</div>
                <div class="value" id="retro-count">-</div>
            </div>
        </div>

        <div class="stats-cards-secondary">
            <div class="stat-card">
                <div class="label">All-Time Peak</div>
                <div class="value" id="all-time-peak">-</div>
                <div class="sub-label" id="all-time-peak-date">-</div>
            </div>
            <div class="stat-card">
                <div class="label">24h Peak</div>
                <div class="value" id="peak-24h">-</div>
                <div class="sub-label" id="peak-24h-time">-</div>
            </div>
            <div class="stat-card">
                <div class="label">24h Average</div>
                <div class="value" id="avg-24h">-</div>
            </div>
        </div>

        <div class="retro-stats-section">
            <h3>Retro Statistics (24h)</h3>
            <div class="retro-stats-grid" id="retro-stats-grid">
            </div>
        </div>

        <div class="graph-section">
            <div id="time-filter-container"></div>
            <div id="online-graph" class="plot-placeholder">
                <div class="skeleton skeleton-graph">Loading graph...</div>
            </div>
            <div class="graph-hint">Double click on a retro to isolate it</div>
        </div>
    </div>
</body>
</html>
